<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KQ Video Player</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #eee;
            min-height: 100vh;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .video-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16/9;
            flex-shrink: 0;
        }

        #player {
            width: 100%;
            height: 100%;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            background: #242424;
            border-radius: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .controls button {
            background: #3d3d3d;
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .controls button:hover {
            background: #e94560;
        }

        .controls button:disabled {
            background: #333;
            cursor: not-allowed;
        }

        .controls button.highlight-mode-active,
        .mobile-nav-row button.highlight-mode-active {
            background: #e94560 !important;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .time-display {
            font-family: monospace;
            font-size: 14px;
            color: #aaa;
        }

        .nav-group {
            display: inline-flex;
            gap: 2px;
            background: #333;
            border-radius: 5px;
            padding: 2px;
        }

        .nav-group button {
            padding: 8px 12px;
            font-size: 12px;
        }

        .current-chapter {
            display: inline;
            font-size: 13px;
            color: #ccc;
            margin-left: auto;
        }

        .current-chapter h3 {
            display: inline;
            color: #e94560;
            font-size: 13px;
            margin-right: 6px;
        }

        .current-chapter p {
            display: inline;
        }

        /* Counterfactual contribution bars */
        .contribution-bars {
            margin-top: 8px;
        }

        .contribution-bars h4 {
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }

        .cf-bar-row {
            display: flex;
            align-items: center;
            margin-bottom: 3px;
            font-size: 11px;
            height: 18px;
        }

        .cf-bar-label {
            width: 150px;
            text-align: right;
            padding-right: 6px;
            color: #aaa;
            flex-shrink: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .cf-bar-track {
            flex: 1;
            height: 14px;
            position: relative;
            background: #1a1a1a;
            border-radius: 2px;
        }

        .cf-bar-center {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: #444;
        }

        .cf-bar-fill {
            position: absolute;
            top: 1px;
            bottom: 1px;
            border-radius: 1px;
            transition: left 0.3s, width 0.3s;
        }

        .cf-bar-fill.positive {
            background: rgba(59,130,246,0.9);
        }

        .cf-bar-fill.negative {
            background: rgba(249,115,22,0.9);
        }

        .cf-bar-value {
            width: 45px;
            text-align: right;
            padding-left: 4px;
            font-family: monospace;
            font-size: 10px;
            color: #888;
            flex-shrink: 0;
        }

        /* Counterfactual grids row */
        .cf-grids-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        /* Egg counterfactual grid */
        .egg-grid {
            margin-top: 8px;
            padding: 10px 15px;
            background: #242424;
            border-radius: 8px;
        }

        .egg-grid h4 {
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }

        .egg-grid-wrapper {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .egg-grid-axis-label {
            font-size: 10px;
            color: #888;
            text-align: center;
        }

        .egg-grid-axis-label.row-label {
            writing-mode: vertical-lr;
            transform: rotate(180deg);
            margin-right: 2px;
        }

        .egg-grid-table-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .egg-grid table {
            border-collapse: collapse;
        }

        .egg-grid th {
            font-size: 10px;
            color: #aaa;
            padding: 2px 4px;
            font-weight: normal;
        }

        .egg-grid td {
            width: 40px;
            height: 40px;
            text-align: center;
            vertical-align: middle;
            font-size: 11px;
            font-weight: 600;
            border: 2px solid #333;
            border-radius: 3px;
            transition: background 0.3s;
        }

        #eggGrid td {
            width: 75px;
            height: 67px;
        }

        .egg-grid td.egg-current {
            border: 2px solid #fff;
            box-shadow: 0 0 6px rgba(255,255,255,0.4);
        }

        /* Map overlay bars */
        .cf-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2147483647;
        }
        .cf-overlay-item {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
        }
        .cf-overlay-label {
            font-size: 13px;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 4px #000, 0 0 2px #000;
            white-space: nowrap;
        }
        .cf-overlay-bar {
            width: 150px;
            height: 10px;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }
        .cf-overlay-bar-fill {
            position: absolute;
            top: 0;
            height: 100%;
            border-radius: 2px;
        }

        .chapter-sidebar {
            width: 350px;
            background: #242424;
            overflow-y: auto;
            border-left: 1px solid #333333;
        }

        .sidebar-header {
            padding: 20px;
            background: #2d2d2d;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .sidebar-header h2 {
            margin-bottom: 10px;
        }

        .sidebar-header input {
            width: 100%;
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            background: #1a1a1a;
            color: #fff;
            font-size: 14px;
        }

        .position-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .position-selector label {
            font-size: 13px;
            color: #aaa;
        }

        .position-selector select {
            flex: 1;
            padding: 6px 10px;
            border: none;
            border-radius: 5px;
            background: #1a1a1a;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
        }

        #highlightCount {
            font-size: 12px;
            color: #e94560;
            font-weight: 600;
        }

        .win-prob-plot {
            width: 100%;
            height: 40px;
            margin-top: 6px;
            background: #1a1a1a;
            border-radius: 4px;
            cursor: pointer;
        }

        .win-prob-plot:hover {
            background: #252545;
        }

        .win-prob-plot svg {
            width: 100%;
            height: 100%;
        }

        .chapter-list {
            padding: 10px;
        }

        .chapter-item {
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .chapter-item:hover {
            background: #383838;
        }

        .chapter-item.active {
            background: #383838;
            border-left-color: #e94560;
        }

        .chapter-item.gold-win {
            border-right: 3px solid #ffd700;
        }

        .chapter-item.blue-win {
            border-right: 3px solid #5ba3ec;
        }

        /* Set styling */
        .chapter-item.set-start {
            margin-top: 16px;
            padding: 14px;
            background: #2d2d2d;
            border-left: 3px solid #e94560;
        }

        .chapter-item.set-start:first-child {
            margin-top: 0;
        }

        .chapter-item.in-set {
            margin-left: 20px;
            padding: 8px 12px;
            font-size: 0.9em;
            opacity: 0.85;
        }

        .chapter-item.in-set .chapter-title {
            font-size: 0.95em;
        }

        .chapter-item.in-set .chapter-time,
        .chapter-item.in-set .chapter-meta {
            font-size: 11px;
        }

        .set-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #e94560;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .chapter-time {
            font-family: monospace;
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .chapter-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chapter-meta {
            font-size: 12px;
            color: #aaa;
        }

        .chapter-meta .winner {
            font-weight: 600;
        }

        .chapter-meta .gold, .set-label .gold { color: #ffd700; }
        .chapter-meta .blue, .set-label .blue { color: #5ba3ec; }

        .kd-stats {
            color: #e94560;
            font-weight: 600;
        }

        .good-prob {
            color: #4caf50;
            font-weight: 600;
        }

        .bad-prob {
            color: #f44336;
            font-weight: 600;
        }

        .load-section {
            padding: 20px;
            text-align: center;
        }

        .keyboard-hints {
            font-size: 15px;
            font-weight: 600;
            color: #aaa;
            margin-top: 10px;
            line-height: 1.8;
        }

        .keyboard-hints kbd {
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            margin: 0 2px;
        }

        .highlight-debug {
            margin-top: 15px;
            padding: 12px;
            background: #242424;
            max-height: 200px;
            overflow-y: auto;
            border-radius: 8px;
            font-size: 13px;
        }

        .highlight-debug h4 {
            margin: 0 0 10px 0;
            color: #e94560;
            font-size: 14px;
        }

        .highlight-debug-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 8px;
            margin-bottom: 4px;
            background: #1a1a1a;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .highlight-debug-item:hover {
            background: #333;
        }

        .highlight-debug-item.active {
            background: #3d3d3d;
            border-left: 3px solid #e94560;
            padding-left: 5px;
        }

        .highlight-debug-pos {
            display: flex;
            align-items: center;
            min-width: 18px;
        }

        .highlight-debug-time {
            font-family: monospace;
            color: #5ba3ec;
            min-width: 60px;
        }

        .highlight-debug-delta {
            font-weight: 600;
            min-width: 50px;
        }

        .highlight-debug-delta.positive {
            color: #4caf50;
        }

        .highlight-debug-delta.negative {
            color: #f44336;
        }

        .highlight-debug-type {
            color: #aaa;
            font-size: 12px;
        }

        .highlight-debug-game {
            color: #888;
            font-size: 11px;
            margin-left: auto;
        }

        .highlight-debug-empty {
            color: #666;
            font-style: italic;
        }

        .highlight-debug-values {
            font-family: monospace;
            font-size: 11px;
            color: #888;
            padding: 2px 8px 6px 68px;
            margin-top: -4px;
            margin-bottom: 4px;
        }

        /* Mobile styles - use pointer:coarse to detect touch devices */
        @media (pointer: coarse), (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .chapter-sidebar {
                display: none;
            }

            .video-section {
                height: 100vh;
                padding: 10px;
            }

            .keyboard-hints {
                display: none;
            }

            .controls {
                display: none;
            }

            .current-chapter {
                display: none;
            }

            .contribution-bars {
                display: none !important;
            }

            .cf-grids-row {
                display: none !important;
            }

            .cf-overlay {
                display: none !important;
            }

            .highlight-debug {
                display: none;
            }

            .mobile-toggle {
                position: fixed;
                bottom: 20px;
                right: 20px;
                width: 44px;
                height: 44px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.2);
                border: 1px solid rgba(255, 255, 255, 0.3);
                color: white;
                font-size: 22px;
                z-index: 100;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
            }

            .mobile-controls {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                padding: 12px;
                transform: translateY(100%);
                transition: transform 0.3s ease;
                z-index: 99;
            }

            .mobile-controls.visible {
                transform: translateY(0);
            }

            .mobile-nav-row {
                display: flex;
                justify-content: center;
                gap: 8px;
                margin-bottom: 10px;
            }

            .nav-group-left, .nav-group-right {
                display: flex;
                gap: 6px;
                background: rgba(0, 0, 0, 0.3);
                backdrop-filter: blur(4px);
                -webkit-backdrop-filter: blur(4px);
                padding: 8px;
                border-radius: 8px;
            }

            .mobile-nav-row button {
                padding: 10px 10px;
                font-size: 13px;
                background: rgba(255, 255, 255, 0.15);
                border: 1px solid rgba(255, 255, 255, 0.2);
                color: white;
                border-radius: 6px;
                cursor: pointer;
            }

            .mobile-nav-row button:active {
                background: rgba(255, 255, 255, 0.3);
            }

            .mobile-select {
                padding: 10px;
                font-size: 14px;
                background: rgba(255, 255, 255, 0.15);
                border: 1px solid rgba(255, 255, 255, 0.2);
                color: white;
                border-radius: 6px;
                max-width: 120px;
            }

            /* Landscape: side controls */
            @media (orientation: landscape) {
                .mobile-controls {
                    top: 0;
                    background: transparent;
                    padding: 0;
                    pointer-events: none;
                }

                .mobile-controls.visible {
                    transform: none;
                }

                .mobile-nav-row {
                    position: static;
                    pointer-events: none;
                }

                .nav-group-left {
                    position: fixed;
                    left: 8px;
                    top: 50%;
                    transform: translateY(-50%);
                    flex-direction: column;
                    gap: 8px;
                    pointer-events: auto;
                }

                .nav-group-right {
                    position: fixed;
                    right: 8px;
                    top: 50%;
                    transform: translateY(-50%);
                    flex-direction: column;
                    gap: 8px;
                    pointer-events: auto;
                }

                .mobile-toggle {
                    top: 8px;
                    bottom: auto;
                }
            }

        }

        /* Hide mobile elements on desktop (non-touch devices above 768px) */
        @media (pointer: fine) and (min-width: 769px) {
            .mobile-toggle, .mobile-controls {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-section">
            <div class="video-wrapper">
                <div id="player"></div>
                <div id="cfOverlay" class="cf-overlay"></div>
            </div>

            <div class="controls">
                <button id="playPause">▶ Play</button>
                <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
                <span class="nav-group">
                    <button id="prevSet" title="Previous set (Shift+S)">◀Set</button>
                    <button id="nextSet" title="Next set (S)">Set▶</button>
                </span>
                <span class="nav-group">
                    <button id="prevChapter" title="Previous game (Shift+G)">◀Game</button>
                    <button id="nextChapter" title="Next game (G)">Game▶</button>
                </span>
                <span class="nav-group">
                    <button id="prevEgg" title="Previous queen kill (Shift+E)">◀Egg</button>
                    <button id="nextEgg" title="Next queen kill (E)">Egg▶</button>
                </span>
                <span class="nav-group">
                    <button id="prevHighlightBtn" title="Previous highlight (Shift+H)">◀HL</button>
                    <button id="nextHighlightBtn" title="Next highlight (H)">HL▶</button>
                </span>
                <button id="highlightModeBtn" title="Auto-play highlights (A)">Auto HL</button>
                <button id="calibrateBtn" title="Click to calibrate game rectangle">Calibrate</button>
                <span class="current-chapter" id="currentChapterInfo"></span>
            </div>
            <div class="cf-grids-row" id="cfGridsRow">
                <div class="egg-grid" id="eggGrid" style="display:none;">
                    <h4>Egg counterfactuals</h4>
                    <div id="eggGridContent"></div>
                </div>
                <div class="egg-grid" id="berryGrid" style="display:none;">
                    <h4>Berry counterfactuals</h4>
                    <div id="berryGridContent"></div>
                </div>
            </div>
            <div class="contribution-bars" id="contributionBars" style="display:none;">
                <h4>What-if event values</h4>
                <div id="cfBarsContent"></div>
            </div>

            <div class="keyboard-hints">
                <kbd>←</kbd><kbd>→</kbd> Seek 5s &nbsp;
                <kbd>J</kbd><kbd>L</kbd> Seek 10s &nbsp;
                <kbd>Space</kbd> Play/Pause<br>
                <kbd>G</kbd> Game (Shift: prev) &nbsp;
                <kbd>S</kbd> Set (Shift: prev) &nbsp;
                <kbd>E</kbd> Egg/queen kill (Shift: prev)<br>
                <kbd>1</kbd>-<kbd>0</kbd> Select position &nbsp;
                <kbd>H</kbd> Player highlight (Shift: prev) &nbsp;
                <kbd>A</kbd> Auto-play highlights
            </div>

            <div class="highlight-debug" id="highlightDebug">
            </div>
        </div>

        <div class="chapter-sidebar">
            <div class="sidebar-header">
                <h2>Chapters</h2>
                <input type="text" id="chapterFilter" placeholder="Filter by map, winner...">
                <div class="position-selector">
                    <label for="playerSelect">Player:</label>
                    <select id="playerSelect">
                        <option value="">Select player...</option>
                    </select>
                </div>
                <div class="position-selector">
                    <label for="positionSelect">Position:</label>
                    <select id="positionSelect">
                        <option value="">Or by position...</option>
                        <option value="10">1 - ▦ Blue Checkers</option>
                        <option value="8">2 - 💀 Blue Skull</option>
                        <option value="2">3 - 👑 Blue Queen</option>
                        <option value="9">4 - 💪 Blue Abs</option>
                        <option value="7">5 - ☰ Blue Stripes</option>
                        <option value="6">6 - ▦ Gold Checkers</option>
                        <option value="4">7 - 💀 Gold Skull</option>
                        <option value="1">8 - 👑 Gold Queen</option>
                        <option value="5">9 - 💪 Gold Abs</option>
                        <option value="3">0 - ☰ Gold Stripes</option>
                    </select>
                    <span id="highlightCount"></span>
                </div>
            </div>
            <div class="chapter-list" id="chapterList">
            </div>
        </div>
    </div>

    <!-- Mobile toggle button -->
    <button class="mobile-toggle" id="mobileToggle">✕</button>

    <!-- Mobile control bar -->
    <div class="mobile-controls visible" id="mobileControls">
        <div class="mobile-nav-row">
            <div class="nav-group-left">
                <button id="mPrevSet">◀◀ S</button>
                <button id="mPrevGame">◀ G</button>
                <button id="mPrevHighlight">◀ H</button>
                <select id="mobilePlayerSelect" class="mobile-select">
                    <option value="">Player...</option>
                </select>
            </div>
            <div class="nav-group-right">
                <button id="mNextSet">S ▶▶</button>
                <button id="mNextGame">G ▶</button>
                <button id="mNextHighlight">H ▶</button>
                <button id="mHighlightMode">Auto</button>
                <select id="mobilePositionSelect" class="mobile-select">
                    <option value="">Position...</option>
                    <option value="10">1 ▦ Blue Chk</option>
                    <option value="8">2 💀 Blue Skl</option>
                    <option value="2">3 👑 Blue Qn</option>
                    <option value="9">4 💪 Blue Abs</option>
                    <option value="7">5 ☰ Blue Str</option>
                    <option value="6">6 ▦ Gold Chk</option>
                    <option value="4">7 💀 Gold Skl</option>
                    <option value="1">8 👑 Gold Qn</option>
                    <option value="5">9 💪 Gold Abs</option>
                    <option value="3">0 ☰ Gold Str</option>
                </select>
            </div>
        </div>
    </div>

    <input type="file" id="chaptersInput" accept=".json" style="display: none;">

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script src="player.js"></script>
</body>
</html>
